<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mind Map — Force-Directed</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="_fake-data.js"></script>
<style>
  :root {
    --bg: #0b0d12;
    --bg-elev: #11141b;
    --bg-elev-2: #161a23;
    --fg: #e6e8ef;
    --fg-dim: #7a8093;
    --fg-mute: #4a5060;
    --line: #1f2330;
    --line-2: #2a2f3d;
    --accent: #e0342f;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  button, input {
    font: inherit;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  svg { display: block; width: 100vw; height: 100vh; cursor: grab; }
  svg:active { cursor: grabbing; }

  /* ---------- Top bar ---------- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 16px;
    pointer-events: none;
    gap: 12px;
    z-index: 5;
  }

  .filters, .legend, .search-wrap {
    pointer-events: auto;
    background: rgba(17, 20, 27, 0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 46vw;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    min-width: 44px;
    padding: 0 10px;
    border-radius: 999px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-2);
    color: var(--fg-dim);
    cursor: pointer;
    transition: all 140ms ease;
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
  }
  .chip:hover { color: var(--fg); border-color: #3a4255; }
  .chip:active { transform: scale(0.96); }
  .chip[data-active="true"] { color: var(--fg); border-color: var(--fg-dim); background: #1c2230; }

  .chip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--c, var(--fg-dim));
  }

  .search-wrap {
    display: flex;
    align-items: center;
    height: 40px;
    padding: 0 12px;
    width: min(360px, 60vw);
  }

  .search-wrap svg.icon {
    width: 14px; height: 14px;
    flex: none;
    color: var(--fg-mute);
    margin-right: 8px;
  }

  .search-wrap input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--fg);
    height: 100%;
  }
  .search-wrap input::placeholder { color: var(--fg-mute); }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 160px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--fg-dim);
    padding: 2px 4px;
  }
  .legend-row .chip-dot { width: 9px; height: 9px; }

  .title {
    position: fixed;
    bottom: 14px; left: 16px;
    color: var(--fg-mute);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ---------- Tooltip ---------- */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(11, 13, 18, 0.94);
    border: 1px solid var(--line-2);
    color: var(--fg);
    font-size: 12px;
    padding: 6px 9px;
    border-radius: 6px;
    transform: translate(-50%, -130%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 100ms ease;
    z-index: 20;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-meta { color: var(--fg-dim); margin-top: 2px; }

  /* ---------- Side panel ---------- */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
    z-index: 30;
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }

  .panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 360px;
    max-width: 100vw;
    background: var(--bg-elev);
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex;
    flex-direction: column;
    z-index: 40;
  }
  .panel.show { transform: translateX(0); }

  @media (max-width: 520px) {
    .panel { width: 100vw; }
    .filters { max-width: 100%; }
    .legend { display: none; }
    .topbar { flex-wrap: wrap; }
    .search-wrap { order: 3; width: 100%; }
  }

  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }
  .panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-title .chip-dot { width: 10px; height: 10px; }
  .panel-title h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 500;
  }
  .panel-sub {
    color: var(--fg-dim);
    font-size: 12px;
    margin-top: 2px;
  }
  .close-btn {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--fg-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .close-btn:hover { color: var(--fg); border-color: var(--fg-dim); }
  .close-btn:active { transform: scale(0.95); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px 24px;
  }

  .note-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 8px 4px;
    background: var(--bg-elev-2);
  }
  .note-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
  }
  .note-meta {
    font-size: 11px;
    color: var(--fg-dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .note-quote {
    font-style: italic;
    color: var(--fg-dim);
    border-left: 2px solid var(--line-2);
    padding: 4px 0 4px 10px;
    margin: 10px 0;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .speedread-btn {
    height: 44px;
    width: 100%;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--fg);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
    transition: all 140ms ease;
    -webkit-appearance: none;
    appearance: none;
  }
  .speedread-btn:hover { border-color: var(--fg-dim); background: #1c2230; }
  .speedread-btn:active { transform: scale(0.97); }
  .speedread-btn::before {
    content: "";
    width: 0; height: 0;
    border-left: 7px solid currentColor;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  /* ---------- D3 nodes ---------- */
  .link { stroke: #3a4255; }
  .node circle {
    stroke: var(--bg);
    stroke-width: 1.5px;
    cursor: pointer;
    transition: stroke 140ms ease;
  }
  .node text {
    fill: var(--fg);
    font-size: 11px;
    pointer-events: none;
    text-anchor: middle;
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .node.dim { opacity: 0.18; }
  .node.match circle { stroke: #fff; stroke-width: 2.5px; }
  .link.dim { opacity: 0.05; }
</style>
</head>
<body>

<div class="topbar">
  <div class="filters" id="filters" role="toolbar" aria-label="Topic filters"></div>

  <div class="search-wrap">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input id="search" type="search" placeholder="Search concepts…" autocomplete="off" />
  </div>

  <div class="legend" id="legend"></div>
</div>

<svg id="graph"></svg>

<div class="title">Knowledge Graph · Force-Directed</div>

<div class="tooltip" id="tooltip"></div>

<div class="backdrop" id="backdrop" data-action="close-panel"></div>
<aside class="panel" id="panel" aria-hidden="true">
  <div class="panel-header">
    <div>
      <div class="panel-title">
        <span class="chip-dot" id="panel-dot"></span>
        <h2 id="panel-name">Concept</h2>
      </div>
      <div class="panel-sub" id="panel-sub"></div>
    </div>
    <button class="close-btn" data-action="close-panel" aria-label="Close panel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="6" y1="18" x2="18" y2="6"></line></svg>
    </button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</aside>

<script>
(function () {
  "use strict";
  const DATA = window.MINDMAP_DATA;
  const { topics, concepts, notes } = DATA;

  const topicById = Object.fromEntries(topics.map(t => [t.id, t]));
  const conceptById = Object.fromEntries(concepts.map(c => [c.id, c]));

  // ---------- derive nodes & edges ----------
  const noteCount = {};
  concepts.forEach(c => (noteCount[c.id] = 0));
  const notesByConcept = {};
  concepts.forEach(c => (notesByConcept[c.id] = []));

  notes.forEach(n => {
    n.concepts.forEach(cid => {
      if (noteCount[cid] !== undefined) {
        noteCount[cid]++;
        notesByConcept[cid].push(n);
      }
    });
  });

  // co-occurrence edges
  const edgeMap = new Map();
  notes.forEach(n => {
    const cs = n.concepts.filter(c => conceptById[c]);
    for (let i = 0; i < cs.length; i++) {
      for (let j = i + 1; j < cs.length; j++) {
        const a = cs[i], b = cs[j];
        const key = a < b ? `${a}|${b}` : `${b}|${a}`;
        edgeMap.set(key, (edgeMap.get(key) || 0) + 1);
      }
    }
  });

  const nodes = concepts.map(c => ({
    id: c.id,
    label: c.label,
    topic: c.topic,
    color: topicById[c.topic].color,
    count: noteCount[c.id],
  }));

  const links = Array.from(edgeMap.entries()).map(([key, weight]) => {
    const [source, target] = key.split("|");
    return { source, target, weight };
  });

  const maxCount = d3.max(nodes, d => d.count) || 1;
  const maxWeight = d3.max(links, d => d.weight) || 1;
  const radius = d3.scaleSqrt().domain([1, maxCount]).range([7, 26]);
  const linkOpacity = d3.scaleLinear().domain([1, maxWeight]).range([0.18, 0.7]);
  const linkWidth = d3.scaleLinear().domain([1, maxWeight]).range([0.6, 2.2]);

  // ---------- SVG setup ----------
  const svg = d3.select("#graph");
  let width = window.innerWidth, height = window.innerHeight;
  svg.attr("viewBox", [0, 0, width, height]);

  const root = svg.append("g");

  const zoom = d3.zoom()
    .scaleExtent([0.4, 4])
    .on("zoom", (event) => root.attr("transform", event.transform));
  svg.call(zoom);

  const linkSel = root.append("g")
    .attr("class", "links")
    .attr("fill", "none")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link")
    .attr("stroke-opacity", d => linkOpacity(d.weight))
    .attr("stroke-width", d => linkWidth(d.weight));

  const nodeSel = root.append("g")
    .attr("class", "nodes")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", dragstart)
      .on("drag", dragged)
      .on("end", dragend));

  nodeSel.append("circle")
    .attr("r", d => radius(d.count))
    .attr("fill", d => d.color)
    .attr("fill-opacity", 0.85);

  nodeSel.append("text")
    .attr("dy", d => -radius(d.count) - 6)
    .text(d => d.count >= 3 ? d.label : "");

  // hover & click
  const tooltip = document.getElementById("tooltip");
  nodeSel
    .on("pointerenter", (event, d) => {
      tooltip.innerHTML = `${escapeHtml(d.label)}<div class="tt-meta">${d.count} note${d.count===1?"":"s"} · ${escapeHtml(topicById[d.topic].label)}</div>`;
      tooltip.style.left = event.clientX + "px";
      tooltip.style.top = event.clientY + "px";
      tooltip.classList.add("show");
    })
    .on("pointermove", (event) => {
      tooltip.style.left = event.clientX + "px";
      tooltip.style.top = event.clientY + "px";
    })
    .on("pointerleave", () => tooltip.classList.remove("show"))
    .on("click", (event, d) => { event.stopPropagation(); openPanel(d); });

  // ---------- simulation ----------
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => 70 + (1 - d.weight / maxWeight) * 30).strength(0.5))
    .force("charge", d3.forceManyBody().strength(-320))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide().radius(d => radius(d.count) + 6))
    .force("x", d3.forceX(width / 2).strength(0.04))
    .force("y", d3.forceY(height / 2).strength(0.04))
    .on("tick", ticked);

  function ticked() {
    linkSel
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  }

  function dragstart(event, d) {
    if (!event.active) sim.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragend(event, d) {
    if (!event.active) sim.alphaTarget(0);
    d.fx = null; d.fy = null;
  }

  // ---------- filters / legend ----------
  const activeTopics = new Set(topics.map(t => t.id)); // all on by default
  const filtersEl = document.getElementById("filters");
  const legendEl = document.getElementById("legend");

  topics.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.action = "toggle-topic";
    btn.dataset.topic = t.id;
    btn.dataset.active = "true";
    btn.innerHTML = `<span class="chip-dot" style="--c:${t.color}"></span>${escapeHtml(t.label)}`;
    filtersEl.appendChild(btn);

    const row = document.createElement("div");
    row.className = "legend-row";
    row.innerHTML = `<span class="chip-dot" style="--c:${t.color}"></span>${escapeHtml(t.label)}`;
    legendEl.appendChild(row);
  });

  // ---------- search ----------
  const searchInput = document.getElementById("search");
  let currentQuery = "";

  function applyFilters() {
    const q = currentQuery.trim().toLowerCase();
    nodeSel.classed("dim", d => {
      const topicMatch = activeTopics.has(d.topic);
      const queryMatch = !q || d.label.toLowerCase().includes(q);
      return !(topicMatch && queryMatch);
    });
    nodeSel.classed("match", d => q && d.label.toLowerCase().includes(q) && activeTopics.has(d.topic));

    linkSel.classed("dim", d => {
      const sTopic = (typeof d.source === "object" ? d.source.topic : conceptById[d.source].topic);
      const tTopic = (typeof d.target === "object" ? d.target.topic : conceptById[d.target].topic);
      return !(activeTopics.has(sTopic) && activeTopics.has(tTopic));
    });
  }

  searchInput.addEventListener("input", (e) => {
    currentQuery = e.target.value;
    applyFilters();
  });

  // ---------- delegated clicks (top bar + panel) ----------
  document.addEventListener("click", (e) => {
    const chip = e.target.closest('[data-action="toggle-topic"]');
    if (chip) {
      const tid = chip.dataset.topic;
      if (activeTopics.has(tid)) activeTopics.delete(tid);
      else activeTopics.add(tid);
      // if user empties the set, restore all
      if (activeTopics.size === 0) topics.forEach(t => activeTopics.add(t.id));
      // sync chip states
      filtersEl.querySelectorAll('[data-action="toggle-topic"]').forEach(c => {
        c.dataset.active = activeTopics.has(c.dataset.topic) ? "true" : "false";
      });
      applyFilters();
      return;
    }

    const closeT = e.target.closest('[data-action="close-panel"]');
    if (closeT) { closePanel(); return; }

    const sr = e.target.closest('[data-action="speedread"]');
    if (sr) {
      console.log("Speed-read again:", sr.dataset.noteId);
      return;
    }
  });

  // ---------- side panel ----------
  const panelEl = document.getElementById("panel");
  const backdropEl = document.getElementById("backdrop");
  const panelName = document.getElementById("panel-name");
  const panelSub = document.getElementById("panel-sub");
  const panelDot = document.getElementById("panel-dot");
  const panelBody = document.getElementById("panel-body");

  function openPanel(node) {
    const topic = topicById[node.topic];
    panelName.textContent = node.label;
    panelSub.textContent = `${topic.label} · ${node.count} linked note${node.count===1?"":"s"}`;
    panelDot.style.setProperty("--c", node.color);
    panelDot.style.background = node.color;

    const linked = notesByConcept[node.id] || [];
    const sorted = linked.slice().sort((a, b) => b.date_read.localeCompare(a.date_read));

    panelBody.innerHTML = sorted.length ? sorted.map(n => `
      <div class="note-card">
        <div class="note-title">${escapeHtml(n.title)}</div>
        <div class="note-meta">${escapeHtml(n.date_read)} · ${n.wpm} wpm · ${escapeHtml(n.source_type)}</div>
        ${n.quotes && n.quotes[0] ? `<div class="note-quote">“${escapeHtml(n.quotes[0])}”</div>` : ""}
        <button class="speedread-btn" data-action="speedread" data-note-id="${escapeHtml(n.id)}">Speed-read again</button>
      </div>
    `).join("") : `<div class="note-card" style="color:var(--fg-dim);font-style:italic;">No notes linked yet.</div>`;

    panelEl.classList.add("show");
    panelEl.setAttribute("aria-hidden", "false");
    backdropEl.classList.add("show");
  }

  function closePanel() {
    panelEl.classList.remove("show");
    panelEl.setAttribute("aria-hidden", "true");
    backdropEl.classList.remove("show");
  }

  // ---------- resize ----------
  window.addEventListener("resize", () => {
    width = window.innerWidth; height = window.innerHeight;
    svg.attr("viewBox", [0, 0, width, height]);
    sim.force("center", d3.forceCenter(width / 2, height / 2));
    sim.force("x", d3.forceX(width / 2).strength(0.04));
    sim.force("y", d3.forceY(height / 2).strength(0.04));
    sim.alpha(0.3).restart();
  });

  // ---------- util ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[c]));
  }
})();
</script>
</body>
</html>

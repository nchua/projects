<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Knowledge Atlas · Radial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..600,0..100,0..1&family=JetBrains+Mono:wght@300;400;500&display=swap" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="_fake-data.js"></script>
<style>
  :root {
    --ink:        #f4ecdc;        /* ivory / bone */
    --ink-dim:    #9a9486;
    --ink-mute:   #5a5548;
    --bg:         #0a0906;        /* near-black, warm */
    --bg-2:       #100e09;
    --bg-3:       #181510;
    --hair:       #2a2519;        /* hairline */
    --hair-2:     #3a3424;
    --brass:      #c9a15a;        /* selected / primary accent */
    --brass-dim:  #8a6b3a;
    --pivot:      #e0342f;        /* matches speed-reader pivot */
    --glass:      rgba(16,14,9,0.72);

    --f-display:  "Fraunces", ui-serif, Georgia, "Times New Roman", serif;
    --f-mono:     "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--f-display);
    font-size: 15px;
    line-height: 1.5;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    position: relative;
    background:
      radial-gradient(ellipse 90% 70% at 50% 55%, #14110b 0%, #0a0906 70%, #07060402 100%),
      var(--bg);
  }
  /* grain overlay */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.90  0 0 0 0 0.80  0 0 0 0.28 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  /* vignette */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    background:
      radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.45) 100%);
  }

  /* ---------- HEADER ---------- */
  header {
    position: relative; z-index: 4;
    padding: 18px 28px 12px;
    border-bottom: 1px solid var(--hair);
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
    background: linear-gradient(to bottom, rgba(10,9,6,0.98), rgba(10,9,6,0.7));
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .mark {
    display: flex; align-items: baseline; gap: 14px;
    min-width: 0;
  }
  .mark .sigil {
    width: 18px; height: 18px;
    flex-shrink: 0;
    transform: translateY(3px);
  }
  .mark .wordmark {
    font-family: var(--f-mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .breadcrumb {
    display: flex; align-items: center; gap: 14px;
    font-family: var(--f-display);
    color: var(--ink);
    min-width: 0;
  }
  .breadcrumb .sep {
    color: var(--ink-mute);
    font-size: 18px;
    line-height: 1;
  }
  .breadcrumb .here {
    font-style: italic;
    font-weight: 400;
    font-variation-settings: "opsz" 72, "SOFT" 50, "WONK" 1;
    font-size: clamp(22px, 3.2vw, 30px);
    letter-spacing: -0.005em;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .breadcrumb .here .dot {
    display: inline-block;
    width: 9px; height: 9px; border-radius: 50%;
    margin-right: 12px;
    vertical-align: 0.14em;
    box-shadow: 0 0 12px currentColor;
  }

  /* topic chips — looks like a small segmented index tab */
  .chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    appearance: none; -webkit-appearance: none;
    background: transparent;
    border: 1px solid var(--hair);
    color: var(--ink-dim);
    font: 400 12px/1 var(--f-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 12px;
    min-height: 44px;
    border-radius: 2px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    touch-action: manipulation;
    position: relative;
    transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
  }
  .chip:hover { color: var(--ink); border-color: var(--hair-2); }
  .chip:active { transform: scale(0.97); }
  .chip .swatch {
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }
  .chip[data-active="true"] {
    color: var(--ink);
    border-color: var(--brass-dim);
    background: linear-gradient(to bottom, rgba(201,161,90,0.08), rgba(201,161,90,0.02));
  }
  .chip[data-active="true"]::before,
  .chip[data-active="true"]::after {
    content: ""; position: absolute;
    width: 6px; height: 6px;
    border: 1px solid var(--brass);
  }
  .chip[data-active="true"]::before {
    left: -1px; top: -1px;
    border-right: 0; border-bottom: 0;
  }
  .chip[data-active="true"]::after {
    right: -1px; bottom: -1px;
    border-left: 0; border-top: 0;
  }

  /* ---------- MAIN ---------- */
  main {
    position: relative;
    flex: 1 1 auto;
    overflow: hidden;
    z-index: 3;
  }
  svg#graph { display: block; width: 100%; height: 100%; }

  /* legend / annotation corners */
  .corner {
    position: absolute;
    font: 400 10px/1.55 var(--f-mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    pointer-events: none;
    z-index: 3;
  }
  .corner .lbl { color: var(--ink-dim); }
  .corner.tl { top: 16px; left: 22px; }
  .corner.tr { top: 16px; right: 22px; text-align: right; }
  .corner.bl { bottom: 16px; left: 22px; }
  .corner.br { bottom: 16px; right: 22px; text-align: right; }
  .corner .big {
    display: block;
    font-family: var(--f-display);
    font-style: italic;
    font-variation-settings: "opsz" 36, "SOFT" 30, "WONK" 1;
    font-size: 22px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink);
    margin-top: 2px;
  }
  .corner .rule {
    display: block;
    width: 40px; height: 1px;
    background: var(--hair-2);
    margin: 6px 0;
  }
  .corner.tr .rule, .corner.br .rule { margin-left: auto; }

  @media (max-width: 720px) {
    .corner.tr, .corner.bl { display: none; }
    .corner.tl, .corner.br { font-size: 9px; }
    .corner .big { font-size: 16px; }
    header { padding: 14px 18px 10px; }
    .mark .wordmark { letter-spacing: 0.18em; }
  }

  /* ---------- SVG elements ---------- */
  .plate { fill: none; stroke: var(--hair); stroke-width: 1; }
  .plate.faint { stroke: var(--hair); stroke-opacity: 0.55; }
  .plate.dashed { stroke: var(--hair-2); stroke-dasharray: 1 5; }

  .ticks line { stroke: var(--hair-2); stroke-width: 1; stroke-linecap: round; }
  .ticks .major { stroke: var(--ink-mute); }
  .ticks-rotor { transform-box: fill-box; transform-origin: center; }
  .ticks-rotor.spin { animation: spin 240s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .cardinal text {
    fill: var(--ink-mute);
    font-family: var(--f-mono);
    font-size: 9px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  .spoke { stroke: var(--hair); stroke-width: 1; fill: none; }

  .link {
    fill: none;
    stroke: var(--hair-2);
    stroke-width: 1;
    opacity: 0.75;
  }
  .link.dashed {
    stroke-dasharray: 2 5;
    opacity: 0.45;
  }
  .link.hot {
    stroke: var(--brass);
    opacity: 1;
    stroke-width: 1.25;
    filter: drop-shadow(0 0 4px rgba(201,161,90,0.55));
  }
  .link.muted { opacity: 0.15; }

  .node { cursor: pointer; }
  .node-concept circle {
    fill: var(--bg-2);
    stroke: var(--ink);
    stroke-width: 1.1;
    transition: stroke 160ms ease, stroke-width 160ms ease, fill 160ms ease;
  }
  .node-concept:hover circle { stroke: var(--brass); }
  .node-concept.selected circle {
    stroke: var(--brass);
    stroke-width: 1.8;
    fill: #1a1509;
    filter: drop-shadow(0 0 8px rgba(201,161,90,0.45));
  }
  .node-concept.pulse { animation: pulse 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.06); }
  }

  .node-note circle {
    fill: var(--ink-dim);
    stroke: none;
    opacity: 0.55;
    transition: fill 160ms ease, opacity 160ms ease, r 160ms ease;
  }
  .node-note:hover circle { fill: var(--ink); opacity: 1; }
  .node-note.selected circle { fill: var(--brass); opacity: 1; }
  .node-note.hot circle    { fill: var(--ink); opacity: 1; }
  .node-note.muted circle  { opacity: 0.12; }

  .concept-label {
    fill: var(--ink);
    font-family: var(--f-display);
    font-size: 12px;
    font-style: italic;
    font-variation-settings: "opsz" 14, "SOFT" 50;
    letter-spacing: 0.01em;
    pointer-events: none;
  }
  .concept-label.dim { fill: var(--ink-dim); }

  .note-tick {
    stroke: var(--ink-mute);
    stroke-width: 1;
    opacity: 0.4;
  }
  .note-tick.hot { stroke: var(--brass); opacity: 0.85; }

  /* center */
  .center-halo {
    transform-box: fill-box; transform-origin: center;
    animation: breathe 6.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1);     opacity: 0.55; }
    50%     { transform: scale(1.08);  opacity: 0.85; }
  }
  .center-disc {
    fill: var(--bg-2);
    stroke: var(--ink);
    stroke-width: 1;
  }
  .center-label {
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: middle;
    font-family: var(--f-display);
    font-style: italic;
    font-variation-settings: "opsz" 72, "SOFT" 50, "WONK" 1;
    font-weight: 400;
    pointer-events: none;
  }
  .center-sub {
    fill: var(--ink-mute);
    text-anchor: middle;
    font-family: var(--f-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    pointer-events: none;
  }
  .center-rule {
    stroke: var(--hair-2);
    stroke-width: 1;
  }

  /* tooltip */
  .tooltip {
    position: absolute; pointer-events: none;
    z-index: 20;
    padding: 8px 12px;
    background: var(--glass);
    border: 1px solid var(--hair-2);
    border-radius: 2px;
    font: 400 12px/1.4 var(--f-mono);
    color: var(--ink);
    transform: translate(-50%, -150%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 120ms ease;
    letter-spacing: 0.02em;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .tooltip[data-show="true"] { opacity: 1; }
  .tooltip .muted { color: var(--ink-mute); }
  .tooltip .accent { color: var(--brass); }

  /* ---------- SIDE PANEL ---------- */
  /* a soft scrim, NOT blocking (pointer-events:none) — fixes backdrop defect */
  .scrim {
    position: absolute; inset: 0;
    pointer-events: none;   /* crucial: never intercept clicks */
    z-index: 8;
    opacity: 0;
    transition: opacity 240ms ease;
    background:
      radial-gradient(ellipse 55% 90% at 100% 50%, rgba(0,0,0,0.55) 0%, transparent 70%);
  }
  .scrim[data-show="true"] { opacity: 1; }

  .panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: min(440px, 92vw);
    background: linear-gradient(180deg, #100e09 0%, #0c0a07 100%);
    border-left: 1px solid var(--hair);
    box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    transform: translateX(100%);
    transition: transform 320ms cubic-bezier(0.2,0.8,0.2,1);
    display: flex; flex-direction: column;
    z-index: 9;
  }
  .panel[data-open="true"] { transform: translateX(0); }
  /* decorative corner brackets on panel */
  .panel::before, .panel::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--brass-dim);
    opacity: 0.6;
    pointer-events: none;
  }
  .panel::before { top: 14px; left: 14px; border-right: 0; border-bottom: 0; }
  .panel::after  { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }

  .panel-header {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--hair);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px;
  }
  .panel-kicker {
    font: 400 10px/1 var(--f-mono);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 12px;
  }
  .panel-title {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-variation-settings: "opsz" 72, "SOFT" 50, "WONK" 1;
    font-size: 26px;
    line-height: 1.15;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin: 0;
  }
  .panel-sub {
    margin-top: 12px;
    font: 400 11px/1.55 var(--f-mono);
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .close-btn {
    appearance: none; -webkit-appearance: none;
    background: transparent;
    border: 1px solid var(--hair-2);
    color: var(--ink-dim);
    width: 44px; height: 44px;
    border-radius: 2px;
    cursor: pointer; flex-shrink: 0;
    font: 400 16px/1 var(--f-mono);
    touch-action: manipulation;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 140ms, border-color 140ms, transform 80ms;
  }
  .close-btn:hover { color: var(--ink); border-color: var(--ink-dim); }
  .close-btn:active { transform: scale(0.95); }

  .panel-body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 22px 28px 32px;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--hair-2); border-radius: 3px; }

  .section-rule {
    display: flex; align-items: center; gap: 10px;
    margin: 26px 0 12px;
  }
  .section-rule:first-child { margin-top: 0; }
  .section-rule .kicker {
    font: 400 10px/1 var(--f-mono);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-mute);
    flex-shrink: 0;
  }
  .section-rule .line {
    flex: 1; height: 1px; background: var(--hair);
  }

  .summary {
    font: 400 15px/1.55 var(--f-display);
    color: var(--ink);
    letter-spacing: 0.002em;
  }

  .quotes {
    list-style: none; padding: 0; margin: 0;
  }
  .quotes li {
    position: relative;
    padding: 8px 0 8px 20px;
    font: italic 400 14px/1.55 var(--f-display);
    font-variation-settings: "opsz" 24, "SOFT" 50;
    color: #e6ddc5;
    border-bottom: 1px dashed var(--hair);
  }
  .quotes li:last-child { border-bottom: 0; }
  .quotes li::before {
    content: "";
    position: absolute; left: 0; top: 16px;
    width: 10px; height: 1px;
    background: var(--brass-dim);
  }

  /* archival concept chips */
  .mini-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .mini-chip {
    appearance: none; -webkit-appearance: none;
    position: relative;
    background: transparent;
    border: 1px solid var(--hair-2);
    color: var(--ink);
    font: 400 10px/1 var(--f-mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0 12px;
    min-height: 32px;
    border-radius: 2px;
    cursor: pointer;
    display: inline-flex; align-items: center;
    touch-action: manipulation;
    transition: color 140ms, border-color 140ms, background 140ms, transform 80ms;
  }
  .mini-chip:hover { color: var(--brass); border-color: var(--brass-dim); background: rgba(201,161,90,0.06); }
  .mini-chip:active { transform: scale(0.96); }
  .mini-chip::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px;
    width: 4px; height: 4px;
    border: 1px solid currentColor;
    border-right: 0; border-bottom: 0;
    opacity: 0.7;
  }
  .mini-chip::after {
    content: "";
    position: absolute;
    bottom: -1px; right: -1px;
    width: 4px; height: 4px;
    border: 1px solid currentColor;
    border-left: 0; border-top: 0;
    opacity: 0.7;
  }

  /* note cards (shown when concept is selected) */
  .note-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .note-row {
    appearance: none; -webkit-appearance: none;
    text-align: left;
    background: transparent;
    border: 1px solid var(--hair);
    color: var(--ink);
    font: inherit;
    padding: 12px 14px;
    border-radius: 2px;
    cursor: pointer;
    touch-action: manipulation;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 14px;
    row-gap: 4px;
    align-items: baseline;
    transition: border-color 140ms, background 140ms, transform 80ms;
  }
  .note-row:hover { border-color: var(--brass-dim); background: rgba(201,161,90,0.04); }
  .note-row:active { transform: scale(0.995); }
  .note-row .idx {
    grid-column: 1; grid-row: 1 / span 2;
    font: 400 10px/1 var(--f-mono);
    color: var(--ink-mute);
    letter-spacing: 0.2em;
    padding-top: 3px;
  }
  .note-row .nt {
    grid-column: 2; grid-row: 1;
    font-family: var(--f-display);
    font-size: 14px;
    line-height: 1.35;
    color: var(--ink);
  }
  .note-row .nm {
    grid-column: 2; grid-row: 2;
    font: 400 10px/1 var(--f-mono);
    color: var(--ink-mute);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .replay-btn {
    appearance: none; -webkit-appearance: none;
    width: 100%;
    margin-top: 20px;
    background: transparent;
    color: var(--brass);
    border: 1px solid var(--brass-dim);
    border-radius: 2px;
    padding: 14px 18px;
    min-height: 48px;
    font: 500 11px/1 var(--f-mono);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    position: relative;
    transition: background 160ms, color 160ms, transform 80ms;
  }
  .replay-btn:hover { background: rgba(201,161,90,0.1); color: #e9c27e; }
  .replay-btn:active { transform: scale(0.98); }
  .replay-btn .arrow {
    display: inline-block;
    width: 0; height: 0;
    border-left: 6px solid currentColor;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  @media (max-width: 520px) {
    .panel { width: 100%; }
    .panel-header { padding: 18px 20px 14px; }
    .panel-title { font-size: 22px; }
    .panel-body { padding: 18px 20px 28px; }
  }

  /* accessible focus */
  button:focus-visible, .note-row:focus-visible {
    outline: 1px solid var(--brass);
    outline-offset: 2px;
  }

  /* hide when mouse, visible on keyboard */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden;
             clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>

<header>
  <div class="mark">
    <svg class="sigil" viewBox="0 0 20 20" aria-hidden="true">
      <circle cx="10" cy="10" r="9" fill="none" stroke="currentColor" stroke-opacity="0.35" />
      <circle cx="10" cy="10" r="5.5" fill="none" stroke="currentColor" stroke-opacity="0.55" />
      <circle cx="10" cy="10" r="1.6" fill="currentColor" />
      <circle cx="10" cy="1" r="1" fill="currentColor" opacity="0.9" />
      <circle cx="19" cy="10" r="0.6" fill="currentColor" opacity="0.7" />
      <circle cx="10" cy="19" r="0.6" fill="currentColor" opacity="0.5" />
      <circle cx="1"  cy="10" r="0.6" fill="currentColor" opacity="0.7" />
    </svg>
    <span class="wordmark">Knowledge · Atlas</span>
  </div>

  <div class="breadcrumb" id="breadcrumb" aria-live="polite">
    <span class="sep">/</span>
    <span class="here" id="bc-here">
      <span class="dot" id="bc-dot" style="background:#7aa2ff;color:#7aa2ff;"></span>
      <span id="bc-label">Learning Science</span>
    </span>
  </div>

  <div class="chips" id="topic-chips" role="tablist" aria-label="Topics"></div>
</header>

<main>
  <svg id="graph" aria-label="Knowledge atlas — radial view"></svg>

  <!-- annotation corners -->
  <div class="corner tl">
    <span class="lbl">Orbit · 01</span>
    <span class="big"><em>Concepts</em></span>
    <span class="rule"></span>
    <span>inner ring</span>
  </div>
  <div class="corner tr">
    <span class="lbl">Orbit · 02</span>
    <span class="big"><em>Notes</em></span>
    <span class="rule"></span>
    <span>outer ring · dashes = cross-topic</span>
  </div>
  <div class="corner bl">
    <span class="lbl">Coordinate</span>
    <span id="coord-stats">—</span>
  </div>
  <div class="corner br">
    <span class="lbl">Session</span>
    <span class="big" id="session-date">—</span>
    <span class="rule"></span>
    <span>tap any node</span>
  </div>

  <div class="scrim" id="scrim"></div>

  <aside class="panel" id="panel" aria-hidden="true">
    <div class="panel-header">
      <div>
        <div class="panel-kicker" id="p-kicker">—</div>
        <h2 class="panel-title" id="p-title">—</h2>
        <div class="panel-sub" id="p-sub"></div>
      </div>
      <button class="close-btn" id="close-btn" data-action="close" aria-label="Close panel">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>

  <div class="tooltip" id="tooltip" role="status"></div>
</main>

<script>
(function () {
  "use strict";
  const DATA = window.MINDMAP_DATA;
  if (!DATA) { console.error("MINDMAP_DATA not loaded"); return; }
  const { topics, concepts, notes } = DATA;

  const topicById   = new Map(topics.map(t => [t.id, t]));
  const conceptById = new Map(concepts.map(c => [c.id, c]));
  const noteById    = new Map(notes.map(n => [n.id, n]));

  // precompute counts
  const conceptNoteCount = new Map();
  concepts.forEach(c => conceptNoteCount.set(c.id, 0));
  notes.forEach(n => n.concepts.forEach(cid => {
    if (conceptNoteCount.has(cid)) conceptNoteCount.set(cid, conceptNoteCount.get(cid) + 1);
  }));

  let selectedTopic = "t_learn";
  let selected = null;  // { kind: 'concept'|'note', id }

  // ---- DOM refs ----
  const svgEl      = document.getElementById("graph");
  const svg        = d3.select(svgEl);
  const chipsEl    = document.getElementById("topic-chips");
  const bcDot      = document.getElementById("bc-dot");
  const bcLabel    = document.getElementById("bc-label");
  const panel      = document.getElementById("panel");
  const scrim      = document.getElementById("scrim");
  const tooltip    = document.getElementById("tooltip");
  const pKicker    = document.getElementById("p-kicker");
  const pTitle     = document.getElementById("p-title");
  const pSub       = document.getElementById("p-sub");
  const panelBody  = document.getElementById("panel-body");
  const coordStats = document.getElementById("coord-stats");
  const sessionDate= document.getElementById("session-date");

  // Corner stats that don't change
  sessionDate.innerHTML = `<em>${new Date().toISOString().slice(0,10)}</em>`;

  // ---- Build chips ----
  topics.forEach(t => {
    const b = document.createElement("button");
    b.className = "chip";
    b.dataset.action = "topic";
    b.dataset.topic = t.id;
    b.dataset.active = t.id === selectedTopic ? "true" : "false";
    b.setAttribute("role", "tab");
    b.innerHTML = `<span class="swatch" style="background:${t.color};color:${t.color}"></span>${t.label}`;
    chipsEl.appendChild(b);
  });

  // ---- SVG persistent structure ----
  // top-level group for panning origin/centering
  const gRoot        = svg.append("g").attr("class", "root");
  const gPlate       = gRoot.append("g").attr("class", "plate-layer");
  const gTicksBG     = gRoot.append("g").attr("class", "ticks ticks-bg");
  const gTicksRotor  = gRoot.append("g").attr("class", "ticks ticks-rotor spin");
  const gCardinals   = gRoot.append("g").attr("class", "cardinal");
  const gSpokes      = gRoot.append("g").attr("class", "spokes");
  const gLinks       = gRoot.append("g").attr("class", "links");
  const gNotes       = gRoot.append("g").attr("class", "notes");
  const gConcepts    = gRoot.append("g").attr("class", "concepts");
  const gCenter      = gRoot.append("g").attr("class", "center");

  // state
  let W=0, H=0, cx=0, cy=0;
  let geom = null;

  function measure() {
    const r = svgEl.getBoundingClientRect();
    W = r.width; H = r.height;
    cx = W/2; cy = H/2;
    svg.attr("viewBox", `0 0 ${W} ${H}`);
    const small = Math.min(W, H) < 640;
    const maxR  = Math.min(W, H) * (small ? 0.44 : 0.42);
    geom = {
      small,
      plateR:   maxR,
      outerR:   maxR * 0.92,   // note ring
      innerR:   maxR * 0.54,   // concept ring
      spokeR:   maxR * 0.20,   // inner spoke end
      centerR:  small ? 46 : 58,
      conceptR: small ? 8 : 10,
      noteR:    small ? 4 : 5,
    };
  }

  // ---- Static plate: rings + cardinal ticks + spokes (once per size) ----
  function drawPlate() {
    gPlate.selectAll("*").remove();
    gTicksBG.selectAll("*").remove();
    gTicksRotor.selectAll("*").remove();
    gCardinals.selectAll("*").remove();
    gSpokes.selectAll("*").remove();

    // outer plate
    gPlate.append("circle").attr("class","plate")
      .attr("cx",cx).attr("cy",cy).attr("r", geom.plateR);
    // outer ring (notes)
    gPlate.append("circle").attr("class","plate faint")
      .attr("cx",cx).attr("cy",cy).attr("r", geom.outerR);
    // inner ring (concepts)
    gPlate.append("circle").attr("class","plate dashed")
      .attr("cx",cx).attr("cy",cy).attr("r", geom.innerR);

    // minor ticks outside outer ring
    const ticksGroup = gTicksBG;
    const minorEvery = 5;
    for (let deg = 0; deg < 360; deg += minorEvery) {
      const a = (deg - 90) * Math.PI / 180;
      const r1 = geom.plateR;
      const r2 = geom.plateR + (deg % 30 === 0 ? 10 : 4);
      const isMajor = deg % 30 === 0;
      ticksGroup.append("line")
        .attr("class", isMajor ? "major" : "")
        .attr("x1", cx + Math.cos(a)*r1).attr("y1", cy + Math.sin(a)*r1)
        .attr("x2", cx + Math.cos(a)*r2).attr("y2", cy + Math.sin(a)*r2)
        .attr("stroke-opacity", isMajor ? 0.75 : 0.35);
    }

    // rotor ticks INSIDE the outer ring (slow drift animation)
    for (let deg = 0; deg < 360; deg += 3) {
      const a = (deg - 90) * Math.PI / 180;
      const r1 = geom.outerR - 4;
      const r2 = geom.outerR - (deg % 30 === 0 ? 14 : 8);
      gTicksRotor.append("line")
        .attr("x1", cx + Math.cos(a)*r1).attr("y1", cy + Math.sin(a)*r1)
        .attr("x2", cx + Math.cos(a)*r2).attr("y2", cy + Math.sin(a)*r2)
        .attr("stroke-opacity", deg % 30 === 0 ? 0.35 : 0.10);
    }

    // cardinals N/E/S/W
    const cards = [
      { a: 0,    l: "N" },
      { a: 90,   l: "E" },
      { a: 180,  l: "S" },
      { a: 270,  l: "W" },
    ];
    cards.forEach(c => {
      const a = (c.a - 90) * Math.PI / 180;
      gCardinals.append("text")
        .attr("x", cx + Math.cos(a)*(geom.plateR + 22))
        .attr("y", cy + Math.sin(a)*(geom.plateR + 22))
        .attr("text-anchor","middle")
        .attr("dominant-baseline","middle")
        .text(c.l);
    });

    // spokes from center to inner ring along cardinals
    cards.forEach(c => {
      const a = (c.a - 90) * Math.PI / 180;
      gSpokes.append("line").attr("class","spoke")
        .attr("x1", cx + Math.cos(a)*geom.centerR)
        .attr("y1", cy + Math.sin(a)*geom.centerR)
        .attr("x2", cx + Math.cos(a)*(geom.innerR - 2))
        .attr("y2", cy + Math.sin(a)*(geom.innerR - 2))
        .attr("stroke-opacity", 0.45);
    });
  }

  // ---- Layout per topic ----
  function buildLayout(topicId) {
    const topic = topicById.get(topicId);
    const topicConcepts = concepts.filter(c => c.topic === topicId);
    const conceptIds = new Set(topicConcepts.map(c => c.id));
    const relevantNotes = notes.filter(n => n.concepts.some(cid => conceptIds.has(cid)));

    // arrange concepts evenly
    const conceptNodes = topicConcepts.map((c, i) => {
      const a = (i / topicConcepts.length) * Math.PI * 2 - Math.PI / 2;
      return {
        id: c.id, kind: "concept", label: c.label,
        angle: a,
        x: cx + Math.cos(a) * geom.innerR,
        y: cy + Math.sin(a) * geom.innerR,
        count: conceptNoteCount.get(c.id) || 0,
      };
    });
    const conceptPos = new Map(conceptNodes.map(n => [n.id, n]));

    // group notes by their most-relevant in-topic concept, order around outer ring
    // For each note, pick its first in-topic concept; bucket; then within each bucket
    // place notes evenly around the bucket's arc for visual alignment.
    const bucketOf = new Map();
    relevantNotes.forEach(n => {
      const hit = n.concepts.find(cid => conceptIds.has(cid));
      if (!hit) return;
      if (!bucketOf.has(hit)) bucketOf.set(hit, []);
      bucketOf.get(hit).push(n);
    });

    const noteNodes = [];
    topicConcepts.forEach((c, i) => {
      const bucket = bucketOf.get(c.id) || [];
      if (!bucket.length) return;
      const centerA = (i / topicConcepts.length) * Math.PI * 2 - Math.PI / 2;
      const halfSpan = Math.min(
        (Math.PI * 2 / topicConcepts.length) * 0.42,
        Math.PI * 2 / 10
      );
      bucket.forEach((n, j) => {
        const t = bucket.length === 1 ? 0 : (j / (bucket.length - 1) - 0.5);
        const a = centerA + t * halfSpan * 2;
        noteNodes.push({
          id: n.id, kind: "note",
          angle: a,
          x: cx + Math.cos(a) * geom.outerR,
          y: cy + Math.sin(a) * geom.outerR,
          ref: n,
          anchor: c.id,
        });
      });
    });

    // links
    const links = [];
    noteNodes.forEach(nn => {
      const note = nn.ref;
      note.concepts.forEach(cid => {
        if (conceptPos.has(cid)) {
          links.push({
            id: `${nn.id}-${cid}`,
            source: nn, target: conceptPos.get(cid),
            kind: "solid",
            noteId: nn.id, conceptId: cid,
          });
        }
      });
      // cross-topic bridge hint
      const outIds = note.concepts.filter(cid => !conceptPos.has(cid));
      if (outIds.length) {
        const ox = nn.x + Math.cos(nn.angle) * 28;
        const oy = nn.y + Math.sin(nn.angle) * 28;
        links.push({
          id: `${nn.id}-out`,
          source: nn, target: { x: ox, y: oy },
          kind: "dashed",
          noteId: nn.id,
          crossTopics: outIds.map(cid => (conceptById.get(cid) || {}).topic).filter(Boolean),
        });
      }
    });

    return { topic, topicConcepts, relevantNotes, conceptNodes, noteNodes, links };
  }

  // ---- Rendering ----
  let layout = null;

  function render(topicId, animate = true) {
    const dur  = animate ? 700 : 0;
    const ease = d3.easeCubicInOut;

    layout = buildLayout(topicId);
    const topic = layout.topic;

    // ----- CENTER -----
    const centerData = [{
      id: "__center__",
      label: topic.label,
      color: topic.color,
      x: cx, y: cy,
      noteCount: layout.relevantNotes.length,
      conceptCount: layout.topicConcepts.length,
    }];

    const centerSel = gCenter.selectAll("g.center-group").data(centerData, d => d.id);
    const centerEnter = centerSel.enter().append("g").attr("class", "center-group");
    centerEnter.append("circle").attr("class", "center-halo");
    centerEnter.append("circle").attr("class", "center-disc");
    centerEnter.append("line").attr("class", "center-rule");
    centerEnter.append("text").attr("class", "center-label");
    centerEnter.append("text").attr("class", "center-sub");
    const centerAll = centerEnter.merge(centerSel);

    centerAll.select("circle.center-halo")
      .transition().duration(dur).ease(ease)
      .attr("cx", d => d.x).attr("cy", d => d.y)
      .attr("r", geom.centerR + 24)
      .attr("fill", d => d.color)
      .attr("fill-opacity", 0.18);

    centerAll.select("circle.center-disc")
      .transition().duration(dur).ease(ease)
      .attr("cx", d => d.x).attr("cy", d => d.y)
      .attr("r", geom.centerR)
      .attr("stroke", d => d.color);

    centerAll.select("line.center-rule")
      .transition().duration(dur).ease(ease)
      .attr("x1", d => d.x - 18).attr("x2", d => d.x + 18)
      .attr("y1", d => d.y + 6).attr("y2", d => d.y + 6);

    centerAll.select("text.center-label")
      .attr("x", d => d.x).attr("y", d => d.y - 6)
      .attr("font-size", geom.small ? 14 : 17)
      .text(d => d.label);

    centerAll.select("text.center-sub")
      .attr("x", d => d.x).attr("y", d => d.y + 18)
      .text(d => `${d.conceptCount} concepts · ${d.noteCount} notes`);

    // update breadcrumb
    bcDot.style.background = topic.color;
    bcDot.style.color = topic.color;
    bcLabel.textContent = topic.label;

    // coordinate stat
    coordStats.innerHTML = `<em>${topic.label.split(" ").map(w => w[0]).join("").toUpperCase()}-${layout.topicConcepts.length.toString().padStart(2,"0")}</em>`;

    // ----- LINKS -----
    const linkSel = gLinks.selectAll("path.link").data(layout.links, d => d.id);
    linkSel.exit()
      .transition().duration(dur * 0.45).style("opacity", 0).remove();

    const linkEnter = linkSel.enter()
      .append("path")
      .attr("class", d => "link" + (d.kind === "dashed" ? " dashed" : ""))
      .attr("d", d => arc(cx, cy, cx, cy))
      .style("opacity", 0);

    linkEnter.merge(linkSel)
      .attr("data-note-id", d => d.noteId || "")
      .attr("data-concept-id", d => d.conceptId || "")
      .transition().duration(dur).ease(ease)
      .attr("d", d => arc(d.source.x, d.source.y, d.target.x, d.target.y))
      .style("opacity", d => d.kind === "dashed" ? 0.45 : 0.8);

    // ----- NOTES -----
    const noteSel = gNotes.selectAll("g.node-note").data(layout.noteNodes, d => d.id);
    noteSel.exit()
      .transition().duration(dur * 0.45).style("opacity", 0).remove();

    const noteEnter = noteSel.enter().append("g")
      .attr("class", "node node-note")
      .attr("data-note-id", d => d.id)
      .attr("transform", `translate(${cx},${cy})`)
      .style("opacity", 0);

    // small tick radiating outward from note, like a pin
    noteEnter.append("line").attr("class", "note-tick")
      .attr("x1", 0).attr("y1", 0)
      .attr("x2", d => Math.cos(d.angle) * 8)
      .attr("y2", d => Math.sin(d.angle) * 8);

    noteEnter.append("circle").attr("r", geom.noteR);

    const noteAll = noteEnter.merge(noteSel);
    noteAll.transition().duration(dur).ease(ease)
      .attr("transform", d => `translate(${d.x},${d.y})`)
      .style("opacity", 1);

    noteAll.select("circle")
      .transition().duration(dur).attr("r", geom.noteR);

    noteAll.on("pointerenter", (e, d) => showTooltip(e, `<strong>${esc(d.ref.title)}</strong><br><span class="muted">${d.ref.date_read} · ${d.ref.wpm} wpm · rpe ${d.ref.rpe}</span>`));
    noteAll.on("pointermove",  e => moveTooltip(e));
    noteAll.on("pointerleave", hideTooltip);
    noteAll.on("click", (e, d) => { e.stopPropagation(); openNote(d.id); });

    // ----- CONCEPTS -----
    const conSel = gConcepts.selectAll("g.node-concept").data(layout.conceptNodes, d => d.id);
    conSel.exit()
      .transition().duration(dur * 0.45).style("opacity", 0).remove();

    const conEnter = conSel.enter().append("g")
      .attr("class", "node node-concept")
      .attr("data-concept-id", d => d.id)
      .attr("transform", `translate(${cx},${cy})`)
      .style("opacity", 0);

    conEnter.append("circle").attr("r", geom.conceptR);
    conEnter.append("text").attr("class", "concept-label");

    const conAll = conEnter.merge(conSel);
    conAll.transition().duration(dur).ease(ease)
      .attr("transform", d => `translate(${d.x},${d.y})`)
      .style("opacity", 1);

    conAll.select("circle")
      .transition().duration(dur).attr("r", geom.conceptR);

    // label placement: push OUTWARD from concept (toward outer ring) so labels sit between rings
    conAll.select("text.concept-label")
      .attr("text-anchor", d => {
        const cosA = Math.cos(d.angle);
        if (cosA > 0.2) return "start";
        if (cosA < -0.2) return "end";
        return "middle";
      })
      .attr("dy", d => {
        const sinA = Math.sin(d.angle);
        if (sinA > 0.6) return "1em";
        if (sinA < -0.6) return "-0.3em";
        return "0.35em";
      })
      .attr("x", d => Math.cos(d.angle) * (geom.conceptR + 8))
      .attr("y", d => Math.sin(d.angle) * (geom.conceptR + 8))
      .text(d => d.label);

    // Mark high-count concepts for subtle pulse
    conAll.classed("pulse", d => d.count >= 4);

    conAll.on("pointerenter", (e, d) => showTooltip(e, `<strong>${esc(d.label)}</strong><br><span class="muted">${d.count} note${d.count===1?"":"s"} · <span class="accent">tap to open</span></span>`));
    conAll.on("pointermove",  e => moveTooltip(e));
    conAll.on("pointerleave", hideTooltip);
    conAll.on("click", (e, d) => { e.stopPropagation(); openConcept(d.id); });

    // reapply selected state (in case topic changed while panel open)
    applySelectionStyles();
  }

  // curve for links — gentle bend toward center
  function arc(x1, y1, x2, y2) {
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    // pull curve toward center for a subtle arched feel
    const dx = cx - mx;
    const dy = cy - my;
    const pull = 0.12;
    const qx = mx + dx * pull;
    const qy = my + dy * pull;
    return `M${x1},${y1} Q${qx},${qy} ${x2},${y2}`;
  }

  // ---- Selection-driven highlighting ----
  function applySelectionStyles() {
    const isConcept = selected && selected.kind === "concept";
    const isNote    = selected && selected.kind === "note";

    gConcepts.selectAll("g.node-concept")
      .classed("selected", d => isConcept && d.id === selected.id);

    gNotes.selectAll("g.node-note")
      .classed("selected", d => isNote && d.id === selected.id)
      .classed("hot",      d => isConcept && d.ref.concepts.includes(selected.id))
      .classed("muted",    d => (isConcept || isNote) && !nodeIsRelated(d));

    gNotes.selectAll(".note-tick")
      .classed("hot", d => isConcept && d.ref.concepts.includes(selected.id));

    gLinks.selectAll("path.link")
      .classed("hot",   d => {
        if (!selected) return false;
        if (isConcept) return d.conceptId === selected.id;
        if (isNote)    return d.noteId === selected.id;
        return false;
      })
      .classed("muted", d => {
        if (!selected) return false;
        if (isConcept) return d.conceptId !== selected.id;
        if (isNote)    return d.noteId !== selected.id;
        return false;
      });
  }

  function nodeIsRelated(d) {
    if (!selected) return true;
    if (selected.kind === "concept") {
      return d.kind === "note" ? d.ref.concepts.includes(selected.id)
           : d.id === selected.id;
    }
    if (selected.kind === "note") {
      return d.kind === "note" ? d.id === selected.id
           : (noteById.get(selected.id)?.concepts.includes(d.id));
    }
    return true;
  }

  // ---- Side panel ----
  function openPanel() {
    panel.dataset.open = "true";
    panel.setAttribute("aria-hidden", "false");
    scrim.dataset.show = "true";
  }
  function closePanel() {
    panel.dataset.open = "false";
    panel.setAttribute("aria-hidden", "true");
    scrim.dataset.show = "false";
    selected = null;
    applySelectionStyles();
  }

  function openConcept(cid) {
    const c = conceptById.get(cid);
    if (!c) return;
    selected = { kind: "concept", id: cid };
    applySelectionStyles();

    const topic = topicById.get(c.topic);
    const refNotes = notes.filter(n => n.concepts.includes(cid))
      .sort((a,b) => b.date_read.localeCompare(a.date_read));

    pKicker.innerHTML = `Concept · <span style="color:${topic.color}">${esc(topic.label)}</span>`;
    pTitle.textContent = c.label;
    pSub.textContent = `${refNotes.length} note${refNotes.length === 1 ? "" : "s"} · referenced across the atlas`;

    let body = "";
    body += `<div class="section-rule"><span class="kicker">Notes</span><span class="line"></span></div>`;
    if (!refNotes.length) {
      body += `<p style="color:var(--ink-mute);font-style:italic">No notes reference this concept yet.</p>`;
    } else {
      body += `<div class="note-list">`;
      refNotes.forEach((n, i) => {
        body += `
          <button class="note-row" data-note="${esc(n.id)}">
            <span class="idx">${String(i+1).padStart(2,"0")}</span>
            <span class="nt">${esc(n.title)}</span>
            <span class="nm">${esc(n.date_read)} · ${n.wpm} wpm · ${esc(n.source_type)}</span>
          </button>`;
      });
      body += `</div>`;
    }
    panelBody.innerHTML = body;
    openPanel();
  }

  function openNote(nid) {
    const n = noteById.get(nid);
    if (!n) return;
    selected = { kind: "note", id: nid };
    applySelectionStyles();

    const topic = topicById.get(n.topic);
    pKicker.innerHTML = `Note · <span style="color:${topic.color}">${esc(topic.label)}</span>`;
    pTitle.textContent = n.title;
    pSub.textContent = `${esc(n.source_type)} · ${esc(n.date_read)} · ${n.wpm} wpm · rpe ${n.rpe}`;

    let body = "";
    if (n.summary) {
      body += `<div class="section-rule"><span class="kicker">Summary</span><span class="line"></span></div>`;
      body += `<p class="summary">${esc(n.summary)}</p>`;
    }
    if (n.quotes && n.quotes.length) {
      body += `<div class="section-rule"><span class="kicker">Quotes</span><span class="line"></span></div>`;
      body += `<ul class="quotes">`;
      n.quotes.forEach(q => { body += `<li>${esc(q)}</li>`; });
      body += `</ul>`;
    }
    if (n.concepts && n.concepts.length) {
      body += `<div class="section-rule"><span class="kicker">Concepts</span><span class="line"></span></div>`;
      body += `<div class="mini-chips">`;
      n.concepts.forEach(cid => {
        const c = conceptById.get(cid);
        if (!c) return;
        body += `<button class="mini-chip" data-concept="${esc(c.id)}">${esc(c.label)}</button>`;
      });
      body += `</div>`;
    }
    body += `<button class="replay-btn" data-replay="${esc(n.id)}">
               Speed-read again <span class="arrow"></span>
             </button>`;

    panelBody.innerHTML = body;
    openPanel();
  }

  // ---- Tooltip ----
  function showTooltip(e, html) {
    tooltip.innerHTML = html;
    moveTooltip(e);
    tooltip.dataset.show = "true";
  }
  function moveTooltip(e) {
    const r = svgEl.getBoundingClientRect();
    tooltip.style.left = (e.clientX - r.left) + "px";
    tooltip.style.top  = (e.clientY - r.top)  + "px";
  }
  function hideTooltip() { tooltip.dataset.show = "false"; }

  // ---- Delegated click (HTML controls + outside-click dismiss) ----
  // Crucial fix for the old backdrop defect:
  //   - No opaque backdrop intercepting clicks.
  //   - Clicks on concept/note SVG nodes call e.stopPropagation() above, so they
  //     reach the node handler AND do not bubble up to close the panel.
  //   - Clicks elsewhere (empty SVG, header, scrim, corners) close the panel
  //     if it's open, but still allow new-node clicks to open a new panel
  //     because those stop propagation first.
  document.addEventListener("click", (e) => {
    // topic chips
    const chip = e.target.closest('.chip[data-action="topic"]');
    if (chip) {
      const tid = chip.dataset.topic;
      if (tid !== selectedTopic) {
        selectedTopic = tid;
        document.querySelectorAll('.chip[data-action="topic"]').forEach(el => {
          el.dataset.active = (el.dataset.topic === tid) ? "true" : "false";
        });
        render(selectedTopic, true);
      }
      return;
    }

    // close button
    if (e.target.closest('[data-action="close"]')) {
      closePanel();
      return;
    }

    // in-panel concept chip
    const cchip = e.target.closest("[data-concept]");
    if (cchip) { openConcept(cchip.dataset.concept); return; }

    // in-panel note row
    const nrow = e.target.closest("[data-note]");
    if (nrow) { openNote(nrow.dataset.note); return; }

    // replay button
    const rep = e.target.closest("[data-replay]");
    if (rep) {
      console.log("Speed-read again:", rep.dataset.replay);
      return;
    }

    // outside-click dismiss — close panel unless click is inside panel
    if (panel.dataset.open === "true" && !e.target.closest("#panel")) {
      closePanel();
    }
  });

  // ESC to close
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && panel.dataset.open === "true") closePanel();
  });

  // ---- Resize ----
  const ro = new ResizeObserver(() => {
    measure();
    drawPlate();
    render(selectedTopic, false);
  });
  ro.observe(document.querySelector("main"));

  // ---- Helpers ----
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, ch => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[ch]));
  }

  // ---- Boot ----
  measure();
  drawPlate();
  render(selectedTopic, false);
})();
</script>
</body>
</html>

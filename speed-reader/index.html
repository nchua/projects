<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Speed Reader</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/reader.css">
</head>
<body class="screen-home">
  <main class="home">
    <textarea class="paste" placeholder="Paste text…" spellcheck="false" autofocus></textarea>
    <button class="home-play" aria-label="Start reading" disabled>
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M8 5 L19 12 L8 19 Z" fill="currentColor"></path>
      </svg>
    </button>
    <div class="home-icons">
      <button class="icon-btn" data-action="upload" aria-label="Upload PDF, EPUB, or text file" disabled>
        <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true">
          <path d="M12 4 L12 16 M6 10 L12 4 L18 10 M4 20 L20 20" stroke="currentColor" stroke-width="1.5" fill="none"></path>
        </svg>
      </button>
      <button class="icon-btn" data-action="url" aria-label="Fetch article from URL" disabled>
        <svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true">
          <path d="M10 14 L14 10 M8 12 a4 4 0 0 1 0-4 l2 -2 a4 4 0 0 1 6 6 l-1 1 M14 12 a4 4 0 0 1 0 4 l-2 2 a4 4 0 0 1 -6 -6 l1 -1" stroke="currentColor" stroke-width="1.5" fill="none"></path>
        </svg>
      </button>
    </div>
    <input type="file" class="file-input" accept=".pdf,.epub,.txt,.md,text/plain" hidden>
    <div class="status" role="status" aria-live="polite"></div>
    <button class="library-dot" data-action="library" aria-label="Library" hidden></button>
    <aside class="library-panel" aria-hidden="true">
      <div class="library-header">
        <span>Library</span>
        <button class="library-close" aria-label="Close library">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M6 6 L18 18 M18 6 L6 18" stroke="currentColor" stroke-width="1.5" fill="none"></path>
          </svg>
        </button>
      </div>
      <div class="library-list"></div>
    </aside>
  </main>

  <div class="reader" aria-hidden="true">
    <div class="rail rail-top"></div>
    <div class="band">
      <div class="tick tick-top"></div>
      <div class="word-slot">
        <span class="pre"></span><span class="piv"></span><span class="post"></span>
      </div>
      <div class="tick tick-bottom"></div>
      <div class="wpm-label"><em>0 wpm</em></div>
    </div>
    <div class="rail rail-bottom"></div>
    <div class="progress"><div class="progress-fill"></div></div>
    <button class="tap-surface" aria-label="Toggle controls" tabindex="-1"></button>
    <div class="controls">
      <button class="play-pause" aria-label="Play / pause">
        <svg class="ico-play" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M8 5 L19 12 L8 19 Z" fill="currentColor"></path>
        </svg>
        <svg class="ico-pause" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M7 5 H10 V19 H7 Z M14 5 H17 V19 H14 Z" fill="currentColor"></path>
        </svg>
      </button>
      <input type="range" class="wpm-slider" min="100" max="900" step="10" value="350" aria-label="Words per minute">
    </div>
    <button class="close" aria-label="Close reader">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path d="M6 6 L18 18 M18 6 L6 18" stroke="currentColor" stroke-width="1.5" fill="none"></path>
      </svg>
    </button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
